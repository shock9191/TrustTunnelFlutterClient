name: Flutter Android Build

on:
  push:
    branches: [ "master", "custom-samsung-routine", "custom-allow-text-address" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GPR_KEY: ${{ secrets.GPR_KEY }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.38.3'
        channel: 'stable'
        cache: true

    - name: Prepare Android Configuration
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
        echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

        cat <<EOF >> android/local.properties
        signingConfigKeyAlias=debugAlias
        signingConfigKeyPassword=password123
        signingConfigKeyStorePath=app/debug.jks
        signingConfigKeyStorePassword=password123
        EOF

        touch android/app/debug.jks

    - name: Install Dependencies
      run: flutter pub get

    - name: Run Source Generation
      run: |
        flutter pub run intl_utils:generate
        flutter pub run build_runner build --delete-conflicting-outputs

    - name: Initialize Project
      run: make init

    - name: Build split APKs
      run: |
        flutter build apk --debug --split-per-abi --dart-define=GPR_KEY=${{ secrets.GPR_KEY }}

    - name: List generated APKs
      run: ls -lah build/app/outputs/flutter-apk/

    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: trust-tunnel-split-apks
        path: build/app/outputs/flutter-apk/*.apk
