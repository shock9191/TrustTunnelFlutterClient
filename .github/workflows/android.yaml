name: Flutter Android Build

on:
  push:
    branches: [ "master", "custom-samsung-routine", "custom-allow-text-address" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.38.3'
        channel: 'stable'
        cache: true

    # This step fixes the "null to File" error by providing the files Gradle is looking for
    - name: Prepare Android Configuration
      run: |
        # 1. Create local.properties
        echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
        
        # 2. Create a dummy key.properties in case line 71 looks for it
        echo "storePassword=dummy_password" > android/key.properties
        echo "keyPassword=dummy_password" >> android/key.properties
        echo "keyAlias=dummy_alias" >> android/key.properties
        echo "storeFile=dummy.jks" >> android/key.properties
        
        # 3. Create a physical dummy file so the 'File' conversion doesn't fail on a missing path
        touch android/app/dummy.jks

    - name: Initialize Project (make init)
      run: |
        make init
      env:
        GPR_KEY: ${{ secrets.GPR_KEY }}

    - name: Build APK
      run: |
        # We use assembleDebug directly via gradle or flutter build apk --debug
        flutter build apk --debug --dart-define=GPR_KEY=${{ secrets.GPR_KEY }}
      env:
        GPR_KEY: ${{ secrets.GPR_KEY }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: trust-tunnel-fixed
        path: build/app/outputs/flutter-apk/*.apk
