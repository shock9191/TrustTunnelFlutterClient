name: Flutter Android Build

on:
  push:
    branches: [ "master", "custom-samsung-routine", "custom-allow-text-address" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.38.3'
        channel: 'stable'
        cache: true

    # FIX: Create a dummy key.properties to prevent Gradle from crashing at line 71
    - name: Create dummy key.properties
      run: |
        echo "storePassword=password" > android/key.properties
        echo "keyPassword=password" >> android/key.properties
        echo "keyAlias=upload" >> android/key.properties
        echo "storeFile=key.jks" >> android/key.properties
        touch android/app/key.jks

    - name: Initialize Project (make init)
      run: |
        make init
      env:
        GPR_KEY: ${{ secrets.GPR_KEY }}

    - name: Build APK
      run: |
        flutter build apk --debug --dart-define=GPR_KEY=${{ secrets.GPR_KEY }}
      env:
        GPR_KEY: ${{ secrets.GPR_KEY }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: trust-tunnel-fixed
        path: build/app/outputs/flutter-apk/*.apk
