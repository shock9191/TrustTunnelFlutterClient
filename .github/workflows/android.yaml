name: Flutter Android Build

on:
  push:
    branches: [ "master", "custom-samsung-routine", "custom-allow-text-address" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.38.3'
        channel: 'stable'
        cache: true

    - name: Initialize Project (make init)
      run: |
        # This single command runs whatever the original author configured
        # to fetch dependencies and run code generators for plugins/database
        make init
      env:
        GPR_KEY: ${{ secrets.GPR_KEY }}

    - name: Build APK
      run: |
        export GPR_KEY=${{ secrets.GPR_KEY }}
        flutter build apk --debug --no-shrink \
          --dart-define=GPR_KEY=${{ secrets.GPR_KEY }}
      env:
        GPR_KEY: ${{ secrets.GPR_KEY }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: trust-tunnel-fixed
        path: build/app/outputs/flutter-apk/app-debugv1.1.apk
        #atest
