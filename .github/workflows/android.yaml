name: Flutter Android Build

on:
  push:
    branches: [ "master", "custom-samsung-routine", "custom-allow-text-address" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # GitHub Actions treats these as case-insensitive; only use one.
      # Your Gradle script will find this as "GPR_KEY".
      GPR_KEY: ${{ secrets.GPR_KEY }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.38.3'
        channel: 'stable'
        cache: true

    - name: Prepare Android Configuration
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
        echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
        
        cat <<EOF > android/key.properties
        storePassword=password123
        keyPassword=password123
        keyAlias=debugAlias
        storeFile=debug.jks
        EOF
        touch android/app/debug.jks

    - name: Install Dependencies
      run: flutter pub get

    - name: Run Source Generation
      run: |
        flutter pub run intl_utils:generate
        flutter pub run build_runner build --delete-conflicting-outputs

    - name: Initialize Project (make init)
      run: make init

    - name: Build APK
      run: |
        flutter build apk --debug --dart-define=GPR_KEY=${{ secrets.GPR_KEY }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: trust-tunnel-fixed
        path: build/app/outputs/flutter-apk/*.apk
