name: Flutter Android Build

on:
  push:
    branches: [ "master", "custom-samsung-routine", "custom-allow-text-address" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.38.3'
        channel: 'stable'
        cache: true

    - name: Prepare Android Configuration
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
        echo "storePassword=dummy\nkeyPassword=dummy\nkeyAlias=dummy\nstoreFile=dummy.jks" > android/key.properties
        touch android/app/dummy.jks

    - name: Install Dependencies
      run: flutter pub get

    # CRITICAL FIX: Run code generation for Drift, VPN Plugin, and Localization
    - name: Run Source Code Generation
      run: |
        # Generate localization files (AppLocalizations)
        flutter pub run intl_utils:generate
        
        # Generate Database and Plugin files (app_database.g.dart, etc.)
        flutter pub run build_runner build --delete-conflicting-outputs

    - name: Initialize Project (make init)
      run: make init
      env:
        GPR_KEY: ${{ secrets.GPR_KEY }}

    - name: Build APK
      run: |
        flutter build apk --debug \
          --dart-define=GPR_KEY=${{ secrets.GPR_KEY }}
      env:
        GPR_KEY: ${{ secrets.GPR_KEY }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: trust-tunnel-fixed
        path: build/app/outputs/flutter-apk/*.apk
