name: Flutter Android Build

on:
  push:
    branches: [ "master", "custom-samsung-routine" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # OPTIMIZATION: Cache Gradle dependencies
        cache: 'gradle'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.38.3'
        channel: 'stable'
        # OPTIMIZATION: Built-in Flutter caching
        cache: true

    - name: Prepare Configuration
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
        # Use dummy keys for debug builds to prevent line 71 crash
        touch android/key.properties
        echo "storePassword=dummy\nkeyPassword=dummy\nkeyAlias=dummy\nstoreFile=dummy.jks" > android/key.properties

    - name: Quality Gates
      run: |
        flutter pub get
        flutter analyze # Catches code errors before the long build starts
        # flutter test  # Recommended if you have unit tests

    - name: Build APK
      run: |
        # OPTIMIZATION: Use --split-per-abi for smaller, device-specific APKs 
        # or build an App Bundle (.aab) if uploading to Play Store
        flutter build apk --debug --split-per-abi \
          --dart-define=GPR_KEY=${{ secrets.GPR_KEY }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: trust-tunnel-apks
        path: build/app/outputs/flutter-apk/*.apk
