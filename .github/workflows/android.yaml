name: Flutter Android Build

on:
  push:
    branches: [ "master", "custom-samsung-routine", "custom-allow-text-address" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.38.3'
        channel: 'stable'
        cache: true

    - name: Initialize Project (make init)
      run: |
        # Ensure dependencies are fully resolved before building
        make init
      env:
        GPR_KEY: ${{ secrets.GPR_KEY }}

    - name: Build APK
      run: |
        # Use 'flutter build apk --debug' to generate the debug variant
        # Removed '--no-shrink' as it is default in debug and can cause Gradle path issues
        flutter build apk --debug \
          --dart-define=GPR_KEY=${{ secrets.GPR_KEY }}
      env:
        GPR_KEY: ${{ secrets.GPR_KEY }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: trust-tunnel-fixed
        # Using a wildcard pattern ensures the upload succeeds even if 
        # the filename contains version numbers (like v1.1)
        path: build/app/outputs/flutter-apk/*.apk
