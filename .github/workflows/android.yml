name: Flutter Android Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.38.3' # Adjusted to a very stable version
        channel: 'stable'
        cache: true

    - name: Get dependencies
      run: |
        flutter pub get
        # Force generation of localization files specifically
        flutter gen-l10n 
      env:
        GPR_KEY: ${{ secrets.GPR_KEY }}

    - name: Build APK
      run: |
        export GPR_KEY=${{ secrets.GPR_KEY }}
        # Wipe old cache and redo dependencies
        flutter clean
        flutter pub get
        # Generate the missing .g.dart and database files
        flutter pub run build_runner build --delete-conflicting-outputs
        # Build the debug APK while forcing a dummy keystore path to bypass the 'null' error
        flutter build apk --debug --no-shrink \
          --dart-define=GPR_KEY=${{ secrets.GPR_KEY }} \
          -PSTORE_FILE=/usr/local/lib/android/sdk/debug.keystore
      env:
        GPR_KEY: ${{ secrets.GPR_KEY }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: trust-tunnel-fixed
        path: build/app/outputs/flutter-apk/app-debug.apk
